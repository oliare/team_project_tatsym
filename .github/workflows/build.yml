name: SonarCloud
on:
  push:
    branches:
      - main    # long-lived main branch
      - dev     # long-lived development branch
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    steps:
      
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: '17'
          overwrite-settings: false
      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 8.0.x
      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage
     
      - name: Install dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore Dependencies
        run: dotnet restore ./server/server.sln
      
      - name: Build
        run: dotnet build ./server/server.sln --configuration Release --no-restore
    
      - name: SonarScanner Analysis
        id: sonar
        run: |
          .\.sonar\scanner\dotnet-sonarscanner begin /k:"oliare_team_project_tatsym" /o:"oliare" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io"
          dotnet build ./server/server.sln --configuration Release
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
